version: '3.9'
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: learnbudget-sql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourSecurePassword123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - learnbudget-sql-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourSecurePassword123!", "-Q", "SELECT 1", "-C"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - learnbudget-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: learnbudget-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__LearnBudgetConnection: "Server=sqlserver,1433;Database=LearnBudget;User Id=sa;Password=YourSecurePassword123!;TrustServerCertificate=True;"
    ports:
      - "8081:8080"
    restart: unless-stopped

    networks:
      - learnbudget-network

volumes:
  learnbudget-sql-data:

networks:
  learnbudget-network:
    driver: bridge
